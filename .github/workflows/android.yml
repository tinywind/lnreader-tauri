name: Android Release APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/android.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM: android-36
  ANDROID_BUILD_TOOLS: 36.0.0
  ANDROID_NDK_VERSION: 27.1.12297006
  RELEASE_SIGNED_APK_DIR: .tmp/android-release-apks

jobs:
  android-release-apks:
    name: Android release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            pnpm tauri android init --ci --skip-targets-install
          fi

      - name: Configure Android release signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          signing_dir=".tmp/android-release-signing"

          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] &&
             [ -n "$ANDROID_RELEASE_KEY_ALIAS" ] &&
             [ -n "$ANDROID_RELEASE_STORE_PASSWORD" ] &&
             [ -n "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            mkdir -p "$signing_dir"
            keystore="$(pwd)/$signing_dir/release.jks"
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            echo "ANDROID_RELEASE_KEYSTORE_FILE=$keystore" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_STORE_PASSWORD=$ANDROID_RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "::warning::Android release signing secrets are not configured; using the committed public test release key."
          fi

      - name: Build arm64 and x86_64 release APKs
        run: pnpm android:apk:release

      - name: Collect signed release APKs
        run: |
          set -euo pipefail

          release_apk_root="src-tauri/gen/android/app/build/outputs/apk"
          mkdir -p "$RELEASE_SIGNED_APK_DIR"

          mapfile -t release_apks < <(find "$release_apk_root" -type f -path "*/release/*.apk" ! -name "*-aligned.apk" ! -name "*-unsigned.apk" | sort)
          if [ "${#release_apks[@]}" -eq 0 ]; then
            echo "No release APKs found under $release_apk_root."
            exit 1
          fi

          apksigner="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          checksum_file="$RELEASE_SIGNED_APK_DIR/SHA256SUMS.txt"
          : > "$checksum_file"

          for release_apk in "${release_apks[@]}"; do
            variant="$(basename "$(dirname "$(dirname "$release_apk")")")"
            collected_apk="$RELEASE_SIGNED_APK_DIR/lnreader-tauri-${variant}-$(basename "$release_apk")"

            "$apksigner" verify --verbose "$release_apk"
            cp "$release_apk" "$collected_apk"
            (cd "$RELEASE_SIGNED_APK_DIR" && sha256sum "$(basename "$collected_apk")") >> "$checksum_file"
          done

      - name: Upload arm64 signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: lnreader-tauri-arm64-signed-release-apk
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/lnreader-tauri-arm64-*.apk
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3

      - name: Upload x86_64 signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: lnreader-tauri-x86_64-signed-release-apk
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/lnreader-tauri-x86_64-*.apk
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3

      - name: Upload signed release APK checksums
        uses: actions/upload-artifact@v7
        with:
          name: lnreader-tauri-signed-release-apk-checksums
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/SHA256SUMS.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3
