name: Android Release APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/android.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM: android-36
  ANDROID_BUILD_TOOLS: 36.0.0
  ANDROID_NDK_VERSION: 27.1.12297006
  RELEASE_SIGNED_APK_DIR: .tmp/android-release-apks

jobs:
  android-release-apks:
    name: Android release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            pnpm tauri android init --ci --skip-targets-install
          fi

      - name: Build universal and split release APKs
        run: pnpm android:apk:release

      - name: Sign release APKs
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          unsigned_apk_root="src-tauri/gen/android/app/build/outputs/apk"
          signing_dir=".tmp/android-release-signing"
          mkdir -p "$RELEASE_SIGNED_APK_DIR" "$signing_dir"

          mapfile -t unsigned_apks < <(find "$unsigned_apk_root" -type f -path "*/release/*-release-unsigned.apk" | sort)
          if [ "${#unsigned_apks[@]}" -eq 0 ]; then
            echo "No unsigned release APKs found under $unsigned_apk_root."
            exit 1
          fi

          keystore="$signing_dir/release.jks"
          key_alias="$ANDROID_RELEASE_KEY_ALIAS"
          store_password="$ANDROID_RELEASE_STORE_PASSWORD"
          key_password="$ANDROID_RELEASE_KEY_PASSWORD"
          signing_suffix="release-signed"

          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] &&
             [ -n "$key_alias" ] &&
             [ -n "$store_password" ] &&
             [ -n "$key_password" ]; then
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          else
            echo "::warning::Android release signing secrets are not configured; using an ephemeral CI debug key for installable tester artifacts."
            keystore="$signing_dir/ci-debug.jks"
            key_alias="androiddebugkey"
            store_password="android"
            key_password="android"
            signing_suffix="ci-debug-signed"
            keytool -genkeypair \
              -keystore "$keystore" \
              -storetype JKS \
              -storepass "$store_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -dname "CN=LNReaderTauri CI, OU=Android Testing, O=tinywind, L=CI, S=CI, C=US"
          fi

          zipalign="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/zipalign"
          apksigner="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          checksum_file="$RELEASE_SIGNED_APK_DIR/SHA256SUMS.txt"
          : > "$checksum_file"

          for unsigned_apk in "${unsigned_apks[@]}"; do
            abi="$(basename "$(dirname "$(dirname "$unsigned_apk")")")"
            aligned_apk="$signing_dir/lnreader-tauri-${abi}-aligned.apk"
            signed_apk="$RELEASE_SIGNED_APK_DIR/lnreader-tauri-${abi}-${signing_suffix}.apk"

            "$zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
            "$apksigner" sign \
              --ks "$keystore" \
              --ks-key-alias "$key_alias" \
              --ks-pass "pass:$store_password" \
              --key-pass "pass:$key_password" \
              --out "$signed_apk" \
              "$aligned_apk"
            "$apksigner" verify --verbose "$signed_apk"
            (cd "$RELEASE_SIGNED_APK_DIR" && sha256sum "$(basename "$signed_apk")") >> "$checksum_file"
          done

      - name: Upload signed release APKs
        uses: actions/upload-artifact@v7
        with:
          name: lnreader-tauri-signed-release-apks
          path: |
            ${{ env.RELEASE_SIGNED_APK_DIR }}/*.apk
            ${{ env.RELEASE_SIGNED_APK_DIR }}/SHA256SUMS.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3
