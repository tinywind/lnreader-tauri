name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/android.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM: android-36
  ANDROID_BUILD_TOOLS: 36.0.0
  ANDROID_NDK_VERSION: 27.1.12297006

jobs:
  android-debug-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            pnpm tauri android init --ci --skip-targets-install
          fi

      - name: Build debug APK
        run: pnpm tauri android build --debug --apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: lnreader-tauri-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 7
