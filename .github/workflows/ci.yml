# CI for LNReaderTauri (Sprint 0).
#
# Two jobs:
#   1. frontend         — Ubuntu, fast: tsc + drizzle-drift check.
#   2. desktop-build    — Ubuntu + Windows matrix: full `pnpm tauri
#                          build --debug` to catch Rust/native breakage.
#
# macOS and iOS are intentionally absent (no Apple hardware for
# testing — `prd.md §3` v0.1 scope cuts). Android build runs only
# on tag releases (separate workflow, future work).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc

      - name: Generate DB migrations (drift check)
        run: pnpm db:generate
      - name: Fail if drizzle migrations drifted
        run: |
          if ! git diff --exit-code drizzle/; then
            echo "::error::drizzle migrations are out of sync with schema.ts."
            echo "Run 'pnpm db:generate' locally and commit the result."
            exit 1
          fi

  desktop-build:
    name: Desktop debug build (${{ matrix.os }})
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux Tauri 2 deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: tauri build --debug
        run: pnpm tauri build --debug
