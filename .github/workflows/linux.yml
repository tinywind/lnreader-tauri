name: Linux Release Bundles

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/linux.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LINUX_BUNDLE_ARTIFACT_DIR: .tmp/linux-release-bundles

jobs:
  linux-release-bundles:
    name: Linux release bundles (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux release bundle
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      - name: Collect Linux release bundles
        run: |
          set -euo pipefail

          platform="${{ matrix.platform }}"
          target="${{ matrix.rust-target }}"
          bundle_root="src-tauri/target/$target/release/bundle"
          artifact_dir="$LINUX_BUNDLE_ARTIFACT_DIR"
          mkdir -p "$artifact_dir"

          if [ ! -d "$bundle_root" ]; then
            echo "Bundle output directory not found: $bundle_root"
            exit 1
          fi

          collect_one() {
            local type="$1"
            local pattern="$2"
            local files=()

            mapfile -t files < <(find "$bundle_root" -type f -name "$pattern" | sort)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "Missing $type bundle for $platform."
              exit 1
            fi
            if [ "${#files[@]}" -gt 1 ]; then
              echo "Expected one $type bundle for $platform, found multiple."
              printf '%s\n' "${files[@]}"
              exit 1
            fi

            local source_file="${files[0]}"
            local destination="$artifact_dir/norea-$platform-$type-$(basename "$source_file")"
            cp "$source_file" "$destination"
            (cd "$artifact_dir" && sha256sum "$(basename "$destination")") >> "$artifact_dir/SHA256SUMS-$platform.txt"
          }

          : > "$artifact_dir/SHA256SUMS-$platform.txt"
          collect_one appimage "*.AppImage"
          collect_one deb "*.deb"
          collect_one rpm "*.rpm"

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-appimage
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}-appimage-*.AppImage
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3

      - name: Upload Linux deb package
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-deb
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}-deb-*.deb
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3

      - name: Upload Linux rpm package
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-rpm
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}-rpm-*.rpm
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3

      - name: Upload Linux bundle checksums
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-checksums
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/SHA256SUMS-${{ matrix.platform }}.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 3
